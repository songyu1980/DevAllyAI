<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark Code Editor Theme -->
  <rect width="512" height="512" rx="128" fill="#0F172A"/>
  
  <!-- Code Elements: Brackets representing the environment -->
  <path d="M110 140 L50 256 L110 372" stroke="#38BDF8" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M402 140 L462 256 L402 372" stroke="#38BDF8" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code Slash (Optional, semi-transparent) -->
  <path d="M190 400 L322 112" stroke="#38BDF8" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Seagull: Soaring freely through the code -->
  <g transform="translate(40, 40) scale(0.85)">
      <!-- Main Body & Right Wing -->
      <path d="M120 320 
               C 120 320, 200 280, 260 280 
               C 320 280, 440 180, 470 150
               C 480 140, 490 145, 480 155
               C 440 195, 360 320, 300 350
               C 240 380, 140 380, 120 320
               Z" 
            fill="#F8FAFC"/>
            
      <!-- Left Wing (Behind) -->
      <path d="M260 280 
               C 260 280, 220 160, 160 120 
               C 150 110, 170 150, 190 180 
               C 220 225, 260 280, 260 280 Z" 
            fill="#CBD5E1"/>
            
      <!-- Beak -->
      <path d="M470 150 L 500 145 L 475 165 Z" fill="#F59E0B"/>
  </g>
</svg>
